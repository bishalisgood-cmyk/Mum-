
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* iOS স্টাইল ফন্ট */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background: #000; 
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        }
        
        #game-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: none; z-index: 1; }

        /* iOS কন্ট্রোল সেন্টার স্টাইল বক্স */
        .ios-card {
            background: rgba(25, 25, 25, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            position: fixed; z-index: 10000;
            touch-action: none;
        }

        /* লগইন বক্স */
        #login-panel { 
            top: 45%; left: 50%; transform: translate(-50%, -50%);
            width: 180px; padding: 20px; text-align: center;
        }

        /* সিগন্যাল বোর্ড */
        #ai-box {
            top: 20px; left: 10px;
            width: 180px; padding: 15px; display: none;
        }

        .title { font-weight: 900; font-size: 14px; color: #fff; margin-bottom: 15px; letter-spacing: -0.5px; }

        .row { 
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255, 255, 255, 0.1); 
            margin-bottom: 8px; padding: 12px; border-radius: 12px;
        }
        
        .lbl { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.6); text-transform: uppercase; }
        
        /* লাফালাফি এনিমেশন (iOS Bounce) */
        .res-jump { 
            font-weight: 900; font-size: 18px; color: #fff; 
            display: inline-block;
            animation: ios-bounce 0.8s infinite ease-in-out alternate;
        }

        @keyframes ios-bounce {
            0% { transform: scale(1); filter: brightness(1); }
            100% { transform: scale(1.1); filter: brightness(1.3); text-shadow: 0 0 15px rgba(255,255,255,0.5); }
        }

        /* শায়নী সায়ান সার্কেল বাটন */
        .tg-circle { 
            display: flex; margin: 15px auto 0; width: 85px; height: 85px;
            background: linear-gradient(145deg, #007AFF, #00f2ff);
            border: 3px solid #fff; border-radius: 50%;
            color: #fff; font-size: 11px; text-align: center;
            align-items: center; justify-content: center;
            text-decoration: none; font-weight: 900;
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.6);
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 122, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(0, 122, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 122, 255, 0); }
        }

        input { 
            background: rgba(255, 255, 255, 0.1); border: none; color: #fff; 
            padding: 12px; border-radius: 10px; width: 85%; margin-bottom: 15px; 
            font-size: 14px; outline: none; text-align: center;
        }
        
        .btn { 
            background: #fff; color: #000; border: none; 
            padding: 12px; border-radius: 12px; font-size: 13px; 
            font-weight: 800; width: 100%; cursor: pointer;
        }

        #period { 
            font-weight: 900; font-size: 15px; color: #007AFF; 
            text-align: center; margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <iframe id="game-frame" src="https://tkclub2.com/#/register?invitationCode=41226253622"></iframe>

    <div id="login-panel" class="ios-card">
        <div class="title">🔐 ACCESS KEY</div>
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="unlock()">Connect</button>
        <a href="https://t.me/+s-DJWm-YL45iMWQ1" style="color:#007AFF; font-size:11px; text-decoration:none; display:block; margin-top:12px; font-weight:700;">Join Telegram</a>
    </div>

    <div id="ai-box" class="ios-card">
        <div class="title">MISS MIM AKTAR</div>
        <div id="period">P: Analyzing...</div>
        
        <div class="row">
            <span class="lbl">Timer</span>
            <span class="res-jump" id="timer" style="color:#FF3B30; animation:none;">00</span>
        </div>
        <div class="row">
            <span class="lbl">Signal</span>
            <span class="res-jump" id="sig" style="color: #FFD60A;">WAIT</span>
        </div>
        <div class="row">
            <span class="lbl">Number</span>
            <span class="res-jump" id="num" style="color: #34C759;">?</span>
        </div>
        
        <a href="https://t.me/Dkwinvipjds" class="tg-circle">JOIN<br>TELEGRAM</a>
    </div>

    <script>
        function unlock() {
            if(document.getElementById('pass').value === "MimAktar10RM") {
                document.getElementById('login-panel').style.display = 'none';
                document.getElementById('ai-box').style.display = 'block';
                start();
            } else { alert("Access Denied!"); }
        }

        // ড্র্যাগিং সিস্টেম
        function drag(el) {
            let x=0, y=0, ox, oy, move=false;
            el.addEventListener("touchstart", (e) => { ox=e.touches[0].clientX-x; oy=e.touches[0].clientY-y; move=true; });
            document.addEventListener("touchmove", (e) => { if(move) { x=e.touches[0].clientX-ox; y=e.touches[0].clientY-oy; el.style.transform=`translate3d(${x}px,${y}px,0)`; }});
            document.addEventListener("touchend", () => move=false);
        }
        drag(document.getElementById('login-panel'));
        drag(document.getElementById('ai-box'));

        function start() {
            setInterval(() => {
                const n = new Date();
                const bd = new Date(n.getTime() + (n.getTimezoneOffset() * 60000) + (3600000 * 6));
                let s = bd.getSeconds();
                let wait = 30 - (s % 30);
                document.getElementById('timer').innerText = wait.toString().padStart(2, '0');

                let totalM = (bd.getHours() * 60) + bd.getMinutes();
                let pIdx = (totalM * 2) + (s >= 30 ? 2 : 1);
                let dStr = bd.getFullYear().toString() + (bd.getMonth()+1).toString().padStart(2,'0') + bd.getDate().toString().padStart(2,'0');
                document.getElementById('period').innerText = "P: " + dStr + "1000" + pIdx;

                if (wait === 29) {
                    let isBig = Math.random() > 0.5;
                    document.getElementById('sig').innerText = isBig ? "BIG" : "SMALL";
                    document.getElementById('num').innerText = isBig ? [5,6,7,8,9][Math.floor(Math.random()*5)] : [0,1,2,3,4][Math.floor(Math.random()*5)];
                }
            }, 1000);
        }
    </script>
</body>
</html>
